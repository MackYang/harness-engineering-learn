name: Task Card Request
description: Create a task aligned with harness-engineering workflow
title: "[Task] <short title>"
labels: ["task-card"]
body:
  - type: input
    id: task_id
    attributes:
      label: Task ID
      description: e.g. CARD-P0-01
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: Background
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
    validations:
      required: true

  - type: dropdown
    id: risk
    attributes:
      label: Risk Level
      options:
        - Low
        - Medium
        - High
    validations:
      required: true

  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
    validations:
      required: true
